{% extends "base.html" %}
{% block title %}Tournaments - LoL Esports Stats{% endblock %}
{% block content %}

<section class="surface-card p-6 mb-6">
    <div class="section-label">Archive</div>
    <h1 class="section-title mt-2">Tournaments</h1>
</section>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for l in leagues %}
    <a href="/tournament/{{ l.league }}/{{ l.to_year|int }}"
       class="quick-link-card">
        <div class="text-lg font-semibold text-cyan-300">{{ l.league_label or l.league }}</div>
        <div class="text-sm text-slate-400 mt-1">{{ l.from_year|int }} - {{ l.to_year|int }}</div>
        <div class="text-xs text-slate-500 mt-1">{{ l.years|int }} seasons</div>
    </a>
    {% endfor %}
</div>

{% endblock %}

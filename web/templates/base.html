<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LoL Esports Stats{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stat-positive { color: #4ade80; }
        .stat-negative { color: #f87171; }
        .win { background-color: rgba(34, 197, 94, 0.1); }
        .loss { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-blue-400 hover:text-blue-300">LoL Esports Stats</a>
            <div class="flex items-center gap-6">
                <a href="/tournaments" class="text-sm text-gray-300 hover:text-white">Tournaments</a>
                <a href="/rankings" class="text-sm text-gray-300 hover:text-white">Rankings</a>
                <a href="/compare" class="text-sm text-gray-300 hover:text-white">Compare</a>
                <a href="/betting" class="text-sm text-yellow-400 hover:text-yellow-300 font-medium">⚡ Betting</a>
                <form action="/search" method="get" class="flex">
                    <span class="relative">
                        <input type="text" name="q" placeholder="Search player or team..."
                               data-autocomplete="players"
                               class="bg-gray-800 text-sm text-gray-200 px-3 py-1.5 rounded-l border border-gray-700 focus:outline-none focus:border-blue-500 w-48">
                    </span>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-sm px-3 py-1.5 rounded-r">Go</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-800 mt-12 py-6 text-center text-gray-500 text-xs">
        Data from Oracle's Elixir & Riot Games API
    </footer>

    <script>
    function setupAutocomplete(inputEl, mode) {
        let dropdown = document.createElement('div');
        dropdown.className = 'absolute z-50 bg-gray-800 border border-gray-700 rounded-b shadow-lg w-full max-h-60 overflow-y-auto hidden';
        inputEl.parentElement.style.position = 'relative';
        inputEl.parentElement.appendChild(dropdown);

        let debounce = null;

        inputEl.addEventListener('input', function() {
            clearTimeout(debounce);
            const q = this.value.trim();
            if (q.length < 2) { dropdown.classList.add('hidden'); return; }
            debounce = setTimeout(() => {
                fetch(`/api/autocomplete?q=${encodeURIComponent(q)}&mode=${mode}`)
                    .then(r => r.json())
                    .then(items => {
                        if (items.length === 0) { dropdown.classList.add('hidden'); return; }
                        dropdown.innerHTML = items.map(it =>
                            `<div class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm" data-val="${it.label}">
                                <span class="text-gray-100">${it.label}</span>
                                <span class="text-gray-500 text-xs ml-2">${it.sub}</span>
                            </div>`
                        ).join('');
                        dropdown.classList.remove('hidden');
                        dropdown.querySelectorAll('div').forEach(el => {
                            el.addEventListener('mousedown', function(e) {
                                e.preventDefault();
                                inputEl.value = this.dataset.val;
                                dropdown.classList.add('hidden');
                                // Auto-submit the parent form
                                const form = inputEl.closest('form');
                                if (form) form.submit();
                            });
                        });
                    });
            }, 200);
        });

        inputEl.addEventListener('blur', () => setTimeout(() => dropdown.classList.add('hidden'), 150));
        inputEl.addEventListener('focus', function() {
            if (dropdown.innerHTML && this.value.length >= 2) dropdown.classList.remove('hidden');
        });
    }

    document.querySelectorAll('[data-autocomplete]').forEach(el => {
        setupAutocomplete(el, el.dataset.autocomplete);
    });

    // Expandable series rows
    function toggleSeries(btn, team1, team2, date) {
        const row = btn.closest('tr');
        const existingDetail = row.nextElementSibling;
        if (existingDetail && existingDetail.classList.contains('series-detail')) {
            existingDetail.remove();
            btn.textContent = '+';
            return;
        }

        btn.textContent = '...';
        fetch(`/api/series_games?team1=${encodeURIComponent(team1)}&team2=${encodeURIComponent(team2)}&date=${encodeURIComponent(date)}`)
            .then(r => r.json())
            .then(games => {
                if (!games.length) { btn.textContent = '+'; return; }
                btn.textContent = '-';
                const detailRow = document.createElement('tr');
                detailRow.className = 'series-detail';
                const td = document.createElement('td');
                td.colSpan = 99;
                td.className = 'px-2 py-3 bg-gray-950';
                td.innerHTML = renderSeriesGames(games);
                detailRow.appendChild(td);
                row.after(detailRow);
            })
            .catch(() => { btn.textContent = '+'; });
    }

    function renderSeriesGames(games) {
        return games.map(g => {
            const mins = Math.floor((g.length||0) / 60);
            const secs = String(Math.floor((g.length||0) % 60)).padStart(2, '0');
            const t1 = g.team1, t2 = g.team2;
            const t1c = t1.win ? 'text-green-400' : 'text-red-400';
            const t2c = t2.win ? 'text-green-400' : 'text-red-400';

            let html = `<div class="mb-4 bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">`;
            html += `<div class="flex items-center justify-between px-4 py-2 bg-gray-800/50 text-xs">`;
            html += `<span class="font-semibold">Game ${g.game || '?'}</span>`;
            html += `<span class="text-gray-500">${mins}:${secs}</span>`;
            html += `<span><span class="${t1c} font-semibold">${t1.name}</span> ${t1.kills||0} - ${t2.kills||0} <span class="${t2c} font-semibold">${t2.name}</span></span>`;
            html += `</div>`;

            // Draft
            html += `<div class="grid grid-cols-2 gap-2 px-4 py-2 text-xs">`;
            [t1, t2].forEach(t => {
                const wc = t.win ? 'border-green-800/40' : 'border-red-800/40';
                html += `<div class="border-l-2 ${wc} pl-2">`;
                html += `<div class="text-gray-500 uppercase mb-1">${t.name} (${t.side}) ${t.win ? '- WIN' : '- LOSS'}</div>`;
                html += `<div class="flex gap-1 mb-1 flex-wrap">`;
                (t.picks||[]).forEach(p => { html += `<span class="bg-gray-800 px-1.5 py-0.5 rounded">${p}</span>`; });
                html += `</div>`;
                html += `<div class="flex gap-1 flex-wrap text-gray-500">Bans: `;
                (t.bans||[]).forEach(b => { html += `<span class="text-red-400/60">${b}</span> `; });
                html += `</div></div>`;
            });
            html += `</div>`;

            // Player stats
            html += `<table class="w-full text-xs"><thead class="bg-gray-800/30 text-gray-500">`;
            html += `<tr><th class="px-2 py-1 text-center w-8">Pos</th><th class="px-2 py-1 text-left">Player</th><th class="px-2 py-1 text-left">Champ</th><th class="px-2 py-1 text-center">KDA</th><th class="px-2 py-1 text-center">DPM</th><th class="px-2 py-1 text-center">CS/m</th><th class="px-2 py-1 text-center">Gold</th><th class="px-2 py-1 text-center">Vis</th><th class="px-2 py-1 text-center">GD@15</th></tr>`;
            html += `</thead><tbody>`;

            [t1, t2].forEach(t => {
                (t.players||[]).forEach((p, i) => {
                    const rc = p.win ? 'bg-green-900/5' : 'bg-red-900/5';
                    const border = i === 0 ? (t.win ? 'border-t border-green-800/30' : 'border-t border-red-800/30') : '';
                    const gd = p.gd15 > 0 ? 'text-green-400' : (p.gd15 < 0 ? 'text-red-400' : 'text-gray-400');
                    const goldK = p.gold ? (p.gold / 1000).toFixed(1) + 'k' : '-';
                    html += `<tr class="${rc} ${border}">`;
                    html += `<td class="px-2 py-1 text-center text-gray-500 uppercase">${p.pos}</td>`;
                    html += `<td class="px-2 py-1"><a href="/player/${p.player}" class="text-blue-400 hover:text-blue-300">${p.player}</a></td>`;
                    html += `<td class="px-2 py-1 font-semibold">${p.champion||'-'}</td>`;
                    html += `<td class="px-2 py-1 text-center">${p.k}/${p.d}/${p.a}</td>`;
                    html += `<td class="px-2 py-1 text-center text-gray-400">${Math.round(p.dpm)||'-'}</td>`;
                    html += `<td class="px-2 py-1 text-center text-gray-400">${p.cspm||'-'}</td>`;
                    html += `<td class="px-2 py-1 text-center text-gray-400">${goldK}</td>`;
                    html += `<td class="px-2 py-1 text-center text-gray-400">${Math.round(p.vision)||'-'}</td>`;
                    html += `<td class="px-2 py-1 text-center ${gd}">${p.gd15 > 0 ? '+' : ''}${Math.round(p.gd15)||'-'}</td>`;
                    html += `</tr>`;
                });
            });
            html += `</tbody></table></div>`;
            return html;
        }).join('');
    }
    </script>
</body>
</html>

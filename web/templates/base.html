<!DOCTYPE html>
<html lang="en" class="bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LoL Esports Stats{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ static_url('style.css') }}">
    <style>
        .stat-positive { color: #4ade80; }
        .stat-negative { color: #f87171; }
        .win { background-color: rgba(34, 197, 94, 0.1); }
        .loss { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="site-body min-h-screen">
    <div class="site-backdrop" aria-hidden="true"></div>
    <nav class="site-nav sticky top-0 z-50">
        <div class="site-shell">
            <div class="flex flex-col gap-4 py-4 lg:flex-row lg:items-center lg:justify-between">
                <a href="/" class="site-brand">
                    <span class="site-brand-kicker">LoL Esports Data</span>
                    <span class="site-brand-title">Control Room</span>
                </a>
                <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:gap-5">
                    <div class="flex items-center gap-2 xl:gap-3 text-sm whitespace-nowrap overflow-x-auto pb-2 lg:pb-0">
                        <a href="/upcoming" class="site-nav-link">Upcoming</a>
                        <a href="/prob-win" class="site-nav-link">Prob Win</a>
                        <a href="/team-trends" class="site-nav-link site-nav-link-accent">Team Trends</a>
                        <a href="/tournaments" class="site-nav-link">Tournaments</a>
                        <a href="/rankings" class="site-nav-link">Rankings</a>
                        <a href="/compare" class="site-nav-link">Compare</a>
                    </div>
                    <form action="/search" method="get" class="flex w-full max-w-[16rem]">
                        <span class="relative flex-1">
                            <input
                                type="text"
                                name="q"
                                placeholder="Search player or team..."
                                data-autocomplete="players"
                                class="site-search-input"
                            >
                        </span>
                        <button type="submit" class="site-search-button">Search</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="site-shell py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-shell mt-12 py-8 text-center text-xs text-slate-500">
        Data from Oracle's Elixir, Riot APIs and Leaguepedia reconciliation.
    </footer>

    <script>
    function setupAutocomplete(inputEl, mode) {
        let dropdown = document.createElement('div');
        dropdown.className = 'absolute z-50 bg-slate-900 border border-slate-700 rounded-b shadow-lg w-full max-h-60 overflow-y-auto hidden';
        inputEl.parentElement.style.position = 'relative';
        inputEl.parentElement.appendChild(dropdown);

        let debounce = null;

        inputEl.addEventListener('input', function() {
            clearTimeout(debounce);
            const q = this.value.trim();
            if (q.length < 2) { dropdown.classList.add('hidden'); return; }
            debounce = setTimeout(() => {
                fetch(`/api/autocomplete?q=${encodeURIComponent(q)}&mode=${mode}`)
                    .then(r => r.json())
                    .then(items => {
                        if (items.length === 0) { dropdown.classList.add('hidden'); return; }
                        dropdown.innerHTML = items.map(it =>
                            `<div class="px-3 py-2 hover:bg-slate-800 cursor-pointer text-sm" data-val="${it.label}">
                                <span class="text-slate-100">${it.label}</span>
                                <span class="text-slate-500 text-xs ml-2">${it.sub}</span>
                            </div>`
                        ).join('');
                        dropdown.classList.remove('hidden');
                        dropdown.querySelectorAll('div').forEach(el => {
                            el.addEventListener('mousedown', function(e) {
                                e.preventDefault();
                                inputEl.value = this.dataset.val;
                                dropdown.classList.add('hidden');
                                const form = inputEl.closest('form');
                                if (form) form.submit();
                            });
                        });
                    });
            }, 200);
        });

        inputEl.addEventListener('blur', () => setTimeout(() => dropdown.classList.add('hidden'), 150));
        inputEl.addEventListener('focus', function() {
            if (dropdown.innerHTML && this.value.length >= 2) dropdown.classList.remove('hidden');
        });
    }

    document.querySelectorAll('[data-autocomplete]').forEach(el => {
        setupAutocomplete(el, el.dataset.autocomplete);
    });

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function championInitial(name) {
        const cleaned = String(name ?? '').trim();
        return cleaned ? cleaned.charAt(0).toUpperCase() : '?';
    }

    function renderChampionChip(entry, tone = 'default') {
        const name = escapeHtml(entry?.name || '-');
        const imageUrl = entry?.image_url ? escapeHtml(entry.image_url) : '';
        const toneClass = tone === 'ban' ? ' champion-chip-ban' : '';
        const fallbackHidden = imageUrl ? ' hidden' : '';
        const image = imageUrl
            ? `<img src="${imageUrl}" alt="${name}" loading="lazy" decoding="async" class="champion-chip-avatar" onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden')">`
            : '';
        return `<span class="champion-chip${toneClass}">${image}<span class="champion-fallback champion-chip-avatar${fallbackHidden}">${championInitial(name)}</span><span class="champion-chip-label">${name}</span></span>`;
    }

    function renderChampionInline(name, imageUrl, size = 'xs') {
        const safeName = escapeHtml(name || '-');
        const safeImageUrl = imageUrl ? escapeHtml(imageUrl) : '';
        const fallbackHidden = safeImageUrl ? ' hidden' : '';
        const image = safeImageUrl
            ? `<img src="${safeImageUrl}" alt="${safeName}" loading="lazy" decoding="async" class="champion-inline-avatar champion-inline-avatar-${size}" onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden')">`
            : '';
        return `<span class="champion-inline">${image}<span class="champion-fallback champion-inline-avatar champion-inline-avatar-${size}${fallbackHidden}">${championInitial(safeName)}</span><span class="font-semibold">${safeName}</span></span>`;
    }

    function renderSeriesMetric(label, value) {
        return `<span class="series-metric-pill"><span class="series-metric-label">${escapeHtml(label)}</span><span class="series-metric-value">${escapeHtml(value)}</span></span>`;
    }

    function renderDraftSlot(entry, order, tone = 'default') {
        const name = escapeHtml(entry?.name || '-');
        const imageUrl = entry?.image_url ? escapeHtml(entry.image_url) : '';
        const toneClass = tone === 'ban' ? ' draft-slot-ban' : '';
        const fallbackHidden = imageUrl ? ' hidden' : '';
        const image = imageUrl
            ? `<img src="${imageUrl}" alt="${name}" loading="lazy" decoding="async" class="draft-slot-avatar" onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden')">`
            : '';
        return `<div class="draft-slot${toneClass}"><div class="draft-slot-order">${order}</div>${image}<span class="champion-fallback draft-slot-avatar${fallbackHidden}">${championInitial(name)}</span><div class="draft-slot-name">${name}</div></div>`;
    }

    function toggleSeries(btn) {
        const team1 = btn.dataset.seriesTeam1 || '';
        const team2 = btn.dataset.seriesTeam2 || '';
        const date = btn.dataset.seriesDate || '';
        const phase = btn.dataset.seriesPhase || '';

        const row = btn.closest('tr');
        const existingDetail = row.nextElementSibling;
        if (existingDetail && existingDetail.classList.contains('series-detail')) {
            existingDetail.remove();
            btn.textContent = '+';
            return;
        }

        btn.textContent = '...';
        fetch(`/api/series_games?team1=${encodeURIComponent(team1)}&team2=${encodeURIComponent(team2)}&date=${encodeURIComponent(date)}`)
            .then(r => {
                if (!r.ok) throw new Error(`series_games ${r.status}`);
                return r.json();
            })
            .then(games => {
                if (!games.length) { btn.textContent = '+'; return; }
                btn.textContent = '-';
                const detailRow = document.createElement('tr');
                detailRow.className = 'series-detail';
                const td = document.createElement('td');
                td.colSpan = 99;
                td.className = 'px-2 py-3 bg-slate-950';
                td.innerHTML = renderSeriesGames(games, phase);
                detailRow.appendChild(td);
                row.after(detailRow);
            })
            .catch(() => {
                btn.textContent = '+';
                btn.title = 'Failed to load series details';
            });
    }

    function renderSeriesGames(games, phase = '') {
        const seriesHeader = phase
            ? `<div class="mb-3 flex items-center justify-between rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-xs uppercase tracking-[0.18em] text-slate-500"><span>Series Detail</span><span class="text-[#f0c36a]">${escapeHtml(phase)}</span></div>`
            : '';

        return seriesHeader + games.map(g => {
            const mins = Math.floor((g.length||0) / 60);
            const secs = String(Math.floor((g.length||0) % 60)).padStart(2, '0');
            const t1 = g.team1, t2 = g.team2;
            const t1c = t1.win ? 'text-emerald-400' : 'text-rose-400';
            const t2c = t2.win ? 'text-emerald-400' : 'text-rose-400';
            const scoreLine = `${t1.kills || 0} - ${t2.kills || 0}`;

            let html = `<div class="series-game-card">`;
            html += `<div class="series-game-topbar">`;
            html += `<div class="series-game-title-stack">`;
            html += `<span class="series-game-kicker">Game ${g.game || '?'}</span>`;
            html += `<span class="series-game-length">${mins}:${secs}</span>`;
            html += `</div>`;
            html += `<div class="series-game-scorebar">`;
            html += `<span class="${t1c} series-game-team-name">${escapeHtml(t1.name)}</span>`;
            html += `<span class="series-game-score">${escapeHtml(scoreLine)}</span>`;
            html += `<span class="${t2c} series-game-team-name">${escapeHtml(t2.name)}</span>`;
            html += `</div>`;
            html += `</div>`;

            html += `<div class="series-draft-grid">`;
            [t1, t2].forEach(t => {
                const panelClass = t.win ? 'series-team-panel-win' : 'series-team-panel-loss';
                html += `<section class="series-team-panel ${panelClass}">`;
                html += `<div class="series-team-panel-head">`;
                html += `<div>`;
                html += `<div class="series-team-caption">${escapeHtml(t.name)} (${escapeHtml(t.side || '?')})</div>`;
                html += `<div class="series-team-result ${t.win ? 'series-team-result-win' : 'series-team-result-loss'}">${t.win ? 'Win' : 'Loss'}</div>`;
                html += `</div>`;
                html += `<div class="series-team-metrics">`;
                html += renderSeriesMetric('Kills', t.kills || 0);
                html += renderSeriesMetric('Towers', t.towers || 0);
                html += renderSeriesMetric('Dragons', t.dragons || 0);
                html += renderSeriesMetric('Barons', t.barons || 0);
                html += `</div>`;
                html += `</div>`;
                html += `<div class="series-draft-section">`;
                html += `<div class="series-draft-label">Picks</div>`;
                html += `<div class="draft-slot-grid">`;
                (t.pick_cards||[]).forEach((p, index) => { html += renderDraftSlot(p, index + 1); });
                html += `</div>`;
                html += `</div>`;
                html += `<div class="series-draft-section">`;
                html += `<div class="series-draft-label">Bans</div>`;
                html += `<div class="draft-slot-grid">`;
                (t.ban_cards||[]).forEach((b, index) => { html += renderDraftSlot(b, index + 1, 'ban'); });
                html += `</div>`;
                html += `</div>`;
                html += `</section>`;
            });
            html += `</div>`;

            html += `<div class="overflow-x-auto">`;
            html += `<table class="series-detail-table">`;
            html += `<thead>`;
            html += `<tr><th class="w-10 px-3 py-2 text-center">Pos</th><th class="px-3 py-2 text-left">Player</th><th class="px-3 py-2 text-left">Champ</th><th class="px-3 py-2 text-center">KDA</th><th class="px-3 py-2 text-center">DPM</th><th class="px-3 py-2 text-center">CS/m</th><th class="px-3 py-2 text-center">Gold</th><th class="px-3 py-2 text-center">Vis</th><th class="px-3 py-2 text-center">GD@15</th></tr>`;
            html += `</thead><tbody>`;

            [t1, t2].forEach(t => {
                html += `<tr class="series-team-divider"><td colspan="9"><span class="series-team-divider-name">${escapeHtml(t.name)}</span><span class="series-team-divider-meta">${escapeHtml(t.side || '?')} side · ${t.win ? 'Win' : 'Loss'}</span></td></tr>`;
                (t.players||[]).forEach((p, i) => {
                    const rc = p.win ? 'series-player-row-win' : 'series-player-row-loss';
                    const border = i === 0 ? ' series-player-row-first' : '';
                    const gd = p.gd15 > 0 ? 'text-emerald-400' : (p.gd15 < 0 ? 'text-rose-400' : 'text-slate-400');
                    const goldK = p.gold ? (p.gold / 1000).toFixed(1) + 'k' : '-';
                    html += `<tr class="${rc}${border}">`;
                    html += `<td class="px-3 py-2 text-center uppercase text-slate-500">${escapeHtml(p.pos)}</td>`;
                    html += `<td class="px-3 py-2"><a href="/player/${p.player}" class="text-cyan-300 hover:text-cyan-200 font-semibold">${escapeHtml(p.player)}</a></td>`;
                    html += `<td class="px-3 py-2">${renderChampionInline(p.champion, p.champion_image_url)}</td>`;
                    html += `<td class="px-3 py-2 text-center">${escapeHtml(`${p.k}/${p.d}/${p.a}`)}</td>`;
                    html += `<td class="px-3 py-2 text-center text-slate-400">${Math.round(p.dpm)||'-'}</td>`;
                    html += `<td class="px-3 py-2 text-center text-slate-400">${p.cspm||'-'}</td>`;
                    html += `<td class="px-3 py-2 text-center text-slate-400">${goldK}</td>`;
                    html += `<td class="px-3 py-2 text-center text-slate-400">${Math.round(p.vision)||'-'}</td>`;
                    html += `<td class="px-3 py-2 text-center ${gd}">${p.gd15 > 0 ? '+' : ''}${Math.round(p.gd15)||'-'}</td>`;
                    html += `</tr>`;
                });
            });
            html += `</tbody></table></div></div>`;
            return html;
        }).join('');
    }
    </script>
</body>
</html>

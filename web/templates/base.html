<!DOCTYPE html>
<html lang="en" class="bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LoL Esports Stats{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .stat-positive { color: #4ade80; }
        .stat-negative { color: #f87171; }
        .win { background-color: rgba(34, 197, 94, 0.1); }
        .loss { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="site-body min-h-screen">
    <div class="site-backdrop" aria-hidden="true"></div>
    <nav class="site-nav sticky top-0 z-50">
        <div class="site-shell">
            <div class="flex flex-col gap-4 py-4 lg:flex-row lg:items-center lg:justify-between">
                <a href="/" class="site-brand">
                    <span class="site-brand-kicker">LoL Esports Data</span>
                    <span class="site-brand-title">Control Room</span>
                </a>
                <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:gap-6">
                    <div class="flex flex-wrap items-center gap-3 text-sm">
                        <a href="/upcoming" class="site-nav-link">Upcoming</a>
                        <a href="/tournaments" class="site-nav-link">Tournaments</a>
                        <a href="/rankings" class="site-nav-link">Rankings</a>
                        <a href="/compare" class="site-nav-link">Compare</a>
                    </div>
                    <form action="/search" method="get" class="flex w-full max-w-sm">
                        <span class="relative flex-1">
                            <input
                                type="text"
                                name="q"
                                placeholder="Search player or team..."
                                data-autocomplete="players"
                                class="site-search-input"
                            >
                        </span>
                        <button type="submit" class="site-search-button">Search</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="site-shell py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-shell mt-12 py-8 text-center text-xs text-slate-500">
        Data from Oracle's Elixir, Riot APIs and Leaguepedia reconciliation.
    </footer>

    <script>
    function setupAutocomplete(inputEl, mode) {
        let dropdown = document.createElement('div');
        dropdown.className = 'absolute z-50 bg-slate-900 border border-slate-700 rounded-b shadow-lg w-full max-h-60 overflow-y-auto hidden';
        inputEl.parentElement.style.position = 'relative';
        inputEl.parentElement.appendChild(dropdown);

        let debounce = null;

        inputEl.addEventListener('input', function() {
            clearTimeout(debounce);
            const q = this.value.trim();
            if (q.length < 2) { dropdown.classList.add('hidden'); return; }
            debounce = setTimeout(() => {
                fetch(`/api/autocomplete?q=${encodeURIComponent(q)}&mode=${mode}`)
                    .then(r => r.json())
                    .then(items => {
                        if (items.length === 0) { dropdown.classList.add('hidden'); return; }
                        dropdown.innerHTML = items.map(it =>
                            `<div class="px-3 py-2 hover:bg-slate-800 cursor-pointer text-sm" data-val="${it.label}">
                                <span class="text-slate-100">${it.label}</span>
                                <span class="text-slate-500 text-xs ml-2">${it.sub}</span>
                            </div>`
                        ).join('');
                        dropdown.classList.remove('hidden');
                        dropdown.querySelectorAll('div').forEach(el => {
                            el.addEventListener('mousedown', function(e) {
                                e.preventDefault();
                                inputEl.value = this.dataset.val;
                                dropdown.classList.add('hidden');
                                const form = inputEl.closest('form');
                                if (form) form.submit();
                            });
                        });
                    });
            }, 200);
        });

        inputEl.addEventListener('blur', () => setTimeout(() => dropdown.classList.add('hidden'), 150));
        inputEl.addEventListener('focus', function() {
            if (dropdown.innerHTML && this.value.length >= 2) dropdown.classList.remove('hidden');
        });
    }

    document.querySelectorAll('[data-autocomplete]').forEach(el => {
        setupAutocomplete(el, el.dataset.autocomplete);
    });

    function toggleSeries(btn, team1, team2, date) {
        const row = btn.closest('tr');
        const existingDetail = row.nextElementSibling;
        if (existingDetail && existingDetail.classList.contains('series-detail')) {
            existingDetail.remove();
            btn.textContent = '+';
            return;
        }

        btn.textContent = '...';
        fetch(`/api/series_games?team1=${encodeURIComponent(team1)}&team2=${encodeURIComponent(team2)}&date=${encodeURIComponent(date)}`)
            .then(r => r.json())
            .then(games => {
                if (!games.length) { btn.textContent = '+'; return; }
                btn.textContent = '-';
                const detailRow = document.createElement('tr');
                detailRow.className = 'series-detail';
                const td = document.createElement('td');
                td.colSpan = 99;
                td.className = 'px-2 py-3 bg-slate-950';
                td.innerHTML = renderSeriesGames(games);
                detailRow.appendChild(td);
                row.after(detailRow);
            })
            .catch(() => { btn.textContent = '+'; });
    }

    function renderSeriesGames(games) {
        return games.map(g => {
            const mins = Math.floor((g.length||0) / 60);
            const secs = String(Math.floor((g.length||0) % 60)).padStart(2, '0');
            const t1 = g.team1, t2 = g.team2;
            const t1c = t1.win ? 'text-emerald-400' : 'text-rose-400';
            const t2c = t2.win ? 'text-emerald-400' : 'text-rose-400';

            let html = `<div class="mb-4 overflow-hidden rounded-2xl border border-slate-800 bg-slate-900/80">`;
            html += `<div class="flex items-center justify-between px-4 py-2 bg-slate-800/60 text-xs">`;
            html += `<span class="font-semibold">Game ${g.game || '?'}</span>`;
            html += `<span class="text-slate-500">${mins}:${secs}</span>`;
            html += `<span><span class="${t1c} font-semibold">${t1.name}</span> ${t1.kills||0} - ${t2.kills||0} <span class="${t2c} font-semibold">${t2.name}</span></span>`;
            html += `</div>`;

            html += `<div class="grid grid-cols-2 gap-2 px-4 py-2 text-xs">`;
            [t1, t2].forEach(t => {
                const wc = t.win ? 'border-emerald-800/40' : 'border-rose-800/40';
                html += `<div class="border-l-2 ${wc} pl-2">`;
                html += `<div class="mb-1 text-slate-500 uppercase">${t.name} (${t.side}) ${t.win ? '- WIN' : '- LOSS'}</div>`;
                html += `<div class="mb-1 flex flex-wrap gap-1">`;
                (t.picks||[]).forEach(p => { html += `<span class="rounded bg-slate-800 px-1.5 py-0.5">${p}</span>`; });
                html += `</div>`;
                html += `<div class="flex flex-wrap gap-1 text-slate-500">Bans: `;
                (t.bans||[]).forEach(b => { html += `<span class="text-rose-400/60">${b}</span> `; });
                html += `</div></div>`;
            });
            html += `</div>`;

            html += `<table class="w-full text-xs"><thead class="bg-slate-800/30 text-slate-500">`;
            html += `<tr><th class="w-8 px-2 py-1 text-center">Pos</th><th class="px-2 py-1 text-left">Player</th><th class="px-2 py-1 text-left">Champ</th><th class="px-2 py-1 text-center">KDA</th><th class="px-2 py-1 text-center">DPM</th><th class="px-2 py-1 text-center">CS/m</th><th class="px-2 py-1 text-center">Gold</th><th class="px-2 py-1 text-center">Vis</th><th class="px-2 py-1 text-center">GD@15</th></tr>`;
            html += `</thead><tbody>`;

            [t1, t2].forEach(t => {
                (t.players||[]).forEach((p, i) => {
                    const rc = p.win ? 'bg-emerald-900/5' : 'bg-rose-900/5';
                    const border = i === 0 ? (t.win ? 'border-t border-emerald-800/30' : 'border-t border-rose-800/30') : '';
                    const gd = p.gd15 > 0 ? 'text-emerald-400' : (p.gd15 < 0 ? 'text-rose-400' : 'text-slate-400');
                    const goldK = p.gold ? (p.gold / 1000).toFixed(1) + 'k' : '-';
                    html += `<tr class="${rc} ${border}">`;
                    html += `<td class="px-2 py-1 text-center uppercase text-slate-500">${p.pos}</td>`;
                    html += `<td class="px-2 py-1"><a href="/player/${p.player}" class="text-cyan-300 hover:text-cyan-200">${p.player}</a></td>`;
                    html += `<td class="px-2 py-1 font-semibold">${p.champion||'-'}</td>`;
                    html += `<td class="px-2 py-1 text-center">${p.k}/${p.d}/${p.a}</td>`;
                    html += `<td class="px-2 py-1 text-center text-slate-400">${Math.round(p.dpm)||'-'}</td>`;
                    html += `<td class="px-2 py-1 text-center text-slate-400">${p.cspm||'-'}</td>`;
                    html += `<td class="px-2 py-1 text-center text-slate-400">${goldK}</td>`;
                    html += `<td class="px-2 py-1 text-center text-slate-400">${Math.round(p.vision)||'-'}</td>`;
                    html += `<td class="px-2 py-1 text-center ${gd}">${p.gd15 > 0 ? '+' : ''}${Math.round(p.gd15)||'-'}</td>`;
                    html += `</tr>`;
                });
            });
            html += `</tbody></table></div>`;
            return html;
        }).join('');
    }
    </script>
</body>
</html>

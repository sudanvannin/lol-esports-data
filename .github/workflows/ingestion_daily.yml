name: Daily LoL Esports API Ingestion

on:
  schedule:
    # Run every day at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allows manual trigger from the UI

jobs:
  ingest-and-process:
    runs-on: ubuntu-latest

    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      MOTHERDUCK_DB: "lolesports"

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bronze Ingestion (LoL Esports API)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python src/ingestion/collectors.py

      - name: Run Silver Processing (Spark/Pandas)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python scripts/build_silver_lake.py

      - name: Upload Silver Data to MotherDuck
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python scripts/upload_to_motherduck.py --db lolesports

name: Web Fast Lane Refresh

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh-web-fast-lane:
    runs-on: ubuntu-latest

    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      MOTHERDUCK_DB: "lolesports"

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv pydantic pydantic-settings httpx tenacity pandas duckdb

      - name: Refresh fast web tables
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python scripts/refresh_web_fast_lane.py --db "$MOTHERDUCK_DB"

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy

      - name: Check formatting with Black
        run: black --check web/ scripts/upload_to_motherduck.py src/upcoming_matches.py tests/test_upcoming_matches.py

      - name: Lint with Ruff
        run: ruff check web/ scripts/upload_to_motherduck.py src/upcoming_matches.py tests/test_upcoming_matches.py

      - name: Type check with MyPy
        run: mypy src/upcoming_matches.py --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  validate-spark:
    name: Validate Spark Jobs
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark==3.5.0 delta-spark==3.1.0 pytest

      - name: Validate Spark syntax
        run: |
          python -c "import src.processing.bronze_to_silver" || true
          python -c "import src.processing.silver_to_gold" || true

  validate-dags:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ hashFiles('dags/**/*.py') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Airflow
        run: |
          pip install apache-airflow==2.8.1
          export AIRFLOW_HOME=$(pwd)

      - name: Validate DAGs
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from airflow.models import DagBag
          dag_bag = DagBag(dag_folder='dags/', include_examples=False)
          if dag_bag.import_errors:
              print('DAG import errors:')
              for dag_id, error in dag_bag.import_errors.items():
                  print(f'{dag_id}: {error}')
              sys.exit(1)
          print(f'Successfully validated {len(dag_bag.dags)} DAGs')
          "

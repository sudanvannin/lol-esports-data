name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.4.2 ruff==0.15.6 mypy==1.10.0

      - name: Check formatting with Black
        run: black --check web/ scripts/upload_to_motherduck.py src/upcoming_matches.py tests/test_upcoming_matches.py

      - name: Lint with Ruff
        run: ruff check web/ scripts/upload_to_motherduck.py src/upcoming_matches.py tests/test_upcoming_matches.py

      - name: Type check with MyPy
        run: mypy src/upcoming_matches.py --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
